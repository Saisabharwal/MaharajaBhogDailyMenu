<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maharaja Bhog – Daily Thali Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --bg2:#111111;
  --bg3:#161616;
  --card:#1A1A1A;
  --border:#2E2E2E;
  --border2:#3A3A3A;
  --yellow:#F5C000;
  --yellow-light:#FFD740;
  --yellow-dim:#B8900A;
  --cream:#FFFFFF;
  --cream-dim:#CCCCCC;
  --muted:#888888;
  --green-bg:#0D1F0D;
  --green2:#1A3A1A;
}
body{background:var(--bg);font-family:'EB Garamond',serif;color:var(--cream);min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:#000;padding:1.75rem 1.25rem 1.5rem;text-align:center;position:relative}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--yellow),var(--yellow-light),var(--yellow),transparent)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--yellow-dim),transparent)}
.logo-img{width:240px;max-width:80%;margin:0 auto;display:block}
.logo-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.9rem;color:var(--muted);margin-top:0.6rem;letter-spacing:0.3em;text-transform:uppercase}
.logo-divider{display:flex;align-items:center;gap:1rem;margin:0.85rem 2rem 0}
.logo-divider::before,.logo-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--yellow-dim),transparent)}
.logo-divider span{color:var(--yellow);font-size:0.85rem;opacity:0.7}

/* DAY BANNER */
.day-banner{padding:1.25rem 1.5rem 0.85rem;text-align:center;border-bottom:1px solid var(--border)}
.day-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:600;color:var(--yellow-light);line-height:1.1}
.day-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;color:var(--muted);margin-top:0.3rem;letter-spacing:0.08em}

/* PANI PURI */
.pani-puri{background:linear-gradient(135deg,var(--green-bg),var(--green2));margin:0.9rem 1rem 0;border-radius:10px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:0.75rem;border:1px solid rgba(110,200,110,0.12)}
.pp-text h3{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.12em;color:#B8E6B8;margin-bottom:0.18rem}
.pp-text p{font-family:'EB Garamond',serif;font-size:0.9rem;font-style:italic;color:rgba(255,255,255,0.72);line-height:1.35}
.pp-live{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:20px;font-size:0.62rem;color:#B8E6B8;font-family:'Cinzel',serif;margin-top:0.3rem;letter-spacing:0.05em}
.live-dot{width:6px;height:6px;border-radius:50%;background:#6EE86E;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}

/* MENU */
.menu{padding:1rem 1rem 0.5rem}

/* DISH OF DAY */
.dotd{background:linear-gradient(135deg,#1A1400,#241C00);border-radius:12px;padding:1.1rem 1.3rem;margin-bottom:1.1rem;position:relative;overflow:hidden;border:1px solid var(--yellow-dim)}
.dotd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--yellow),var(--yellow-light),var(--yellow))}
.dotd-label{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.25em;color:var(--yellow);margin-bottom:0.35rem;opacity:0.9}
.dotd-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--yellow-light);line-height:1.1}
.dotd-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:rgba(255,255,255,0.4);margin-top:0.2rem}

/* SECTIONS */
.section{margin-bottom:1.1rem}
.sec-hdr{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.65rem}
.sec-dot{width:4px;height:4px;border-radius:50%;background:var(--yellow);flex-shrink:0}
.sec-lbl{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.18em;color:var(--yellow-dim);text-transform:uppercase;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}

/* ITEMS */
.item-list{display:flex;flex-direction:column;gap:0.45rem}
.item{background:var(--card);border-radius:8px;padding:0.7rem 1rem;border:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;position:relative;overflow:hidden}
.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--yellow)}
.item.alt::before{background:var(--yellow-dim)}
.item.gld::before{background:var(--yellow-light)}
.item.dim{background:var(--bg3)}.item.dim::before{background:var(--muted)}
.item-icon{font-size:1rem;flex-shrink:0;opacity:0.6}
.item-name{font-family:'EB Garamond',serif;font-size:1.05rem;font-weight:500;color:var(--cream);line-height:1.2}
.item-tag{font-family:'Cinzel',serif;font-size:0.44rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:0.1rem}

/* AAMRAS */
.item.aamras{background:linear-gradient(135deg,#1A1400,#2A2000);border-color:var(--yellow-dim)}
.item.aamras::before{background:var(--yellow)}
.aamras-tag{font-family:'Cinzel',serif;font-size:0.44rem;letter-spacing:0.1em;color:var(--yellow);margin-bottom:0.1rem}

/* INCLUDED */
.included{background:var(--bg3);border-radius:10px;padding:0.9rem 1rem;border:1px solid var(--border);margin-bottom:1.1rem}
.incl-lbl{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.15em;color:var(--yellow-dim);text-transform:uppercase;margin-bottom:0.55rem;opacity:0.85}
.chips{display:flex;flex-wrap:wrap;gap:0.35rem}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:0.22rem 0.7rem;font-family:'EB Garamond',serif;font-size:0.88rem;color:var(--cream-dim)}

/* WEEKEND */
.weekend-block{background:linear-gradient(135deg,#1A1400,#2A2000);border:1px solid var(--yellow-dim);border-radius:10px;padding:0.9rem 1rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:0.75rem}
.wk-tag{font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.15em;color:var(--yellow);margin-bottom:0.18rem}
.wk-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--yellow-light)}

/* PRICING */
.pricing{background:var(--bg3);border-radius:10px;padding:0.9rem 1rem;border:1px solid var(--border);margin-bottom:1.1rem}
.pr-lbl{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.15em;color:var(--yellow-dim);text-transform:uppercase;margin-bottom:0.6rem}
.pr-row{display:flex;justify-content:space-between;align-items:baseline;padding:0.32rem 0;border-bottom:1px solid var(--border)}
.pr-row:last-child{border-bottom:none;padding-bottom:0}
.pr-item{font-family:'EB Garamond',serif;font-size:0.95rem;color:var(--cream-dim)}
.pr-price{font-family:'Cinzel',serif;font-size:0.82rem;font-weight:600;color:var(--yellow-light)}
.pr-note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.8rem;color:var(--muted);margin-top:0.6rem;line-height:1.5;padding-top:0.5rem;border-top:1px solid var(--border)}

/* ALLERGEN + FOOTER */
.allergen{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:0.75rem;padding:0 0.5rem;line-height:1.5}
.footer{text-align:center;padding:1rem 1rem 2rem;border-top:1px solid var(--border)}
.footer-logo{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:0.2em;color:var(--yellow);opacity:0.4}
</style>
</head>

function render(idx) {
  const d = menu[idx];
  const dayName = DAYS[idx];
  const adultPrice = d.weekend ? "$31.99" : "$29.99";
  const kidPrice = "$14.99";

  const ppBanner = document.getElementById('paniPuriBanner');
  if (!d.weekend) {
    ppBanner.innerHTML = `<div class="pani-puri"><div style="font-size:1.8rem;flex-shrink:0">🫙</div><div class="pp-text"><h3>Pani Puri Counter</h3><p>Live service — visit the counter anytime throughout your meal!</p><div class="pp-live"><div class="live-dot"></div> Live during your visit</div></div></div>`;
  } else {
    ppBanner.innerHTML = '';
  }

  document.getElementById('dayTitle').textContent = `${dayName}'s Menu`;
  document.getElementById('dayQuote').textContent = d.quote;

  document.getElementById('menuContent').innerHTML = `
    <div class="dotd">
      <div class="dotd-label">✦ DISH OF THE DAY ✦</div>
      <div class="dotd-name">${d.dishOfDay.name}</div>
      <div class="dotd-desc">${d.dishOfDay.desc}</div>
    </div>
    <div class="section">${secHdr('Appetizer / Farsan')}<div class="item-list">${items(d.farsan,'','🌿')}</div></div>
    <div class="section">${secHdr('Main Course / Sabzi')}<div class="item-list">${items(d.sabzi,'alt','🍛')}</div></div>
    <div class="section">${secHdr('Dal & Kadhi')}<div class="item-list">${DAL.map(s=>`<div class="item gld dim"><span class="item-icon">🫕</span><div><div class="item-tag">Daily</div><div class="item-name">${s}</div></div></div>`).join('')}</div></div>
    <div class="section">${secHdr('Indian Breads')}<div class="item-list">${items(d.bread,'','🫓')}</div></div>
    <div class="section">${secHdr('Rice')}<div class="item-list">${items(d.rice,'alt','🍚')}</div></div>
    <div class="section">${secHdr('Dessert')}<div class="item-list">
      <div class="item aamras"><span class="item-icon">🥭</span><div><div class="aamras-tag">✦ Summer Special</div><div class="item-name">Aamras</div></div></div>
      <div class="item gld"><span class="item-icon">🍮</span><div><div class="item-tag">Daily Halwa</div><div class="item-name">${d.halwa}</div></div></div>
    </div></div>
    <div class="included"><div class="incl-lbl">Always included with every thali</div><div class="chips"><span class="chip">Masala Chaas</span><span class="chip">Papad Churi</span><span class="chip">Chutney</span><span class="chip">Salad</span><span class="chip">Pickles</span></div></div>
    ${d.weekend ? `<div class="weekend-block"><div style="font-size:1.8rem;flex-shrink:0">🍬</div><div><div class="wk-tag">✦ WEEKEND SPECIAL ✦</div><div class="wk-name">Kesari Jalebi & Mango Jalebi</div></div></div>` : ''}
    <div class="pricing"><div class="pr-lbl">Pricing (Plus Tax)</div><div class="pr-row"><span class="pr-item">Adult Thali</span><span class="pr-price">${adultPrice}</span></div><div class="pr-row"><span class="pr-item">Kids Thali (5–10 yrs)</span><span class="pr-price">${kidPrice}</span></div><div class="pr-note">✦ An 18% gratuity is automatically added for parties of 6 or more.</div></div>
    <div class="allergen">* Our food contains wheat, nuts and dairy products.<br>Any allergic reaction will be the responsibility of the diner.</div>
    <div class="footer"><div class="footer-logo">Maharaja Bhog</div></div>
  `;
}

const jsDay = new Date().getDay();
const todayIdx = jsDay === 0 ? 6 : jsDay - 1;
render(todayIdx);
</script>
</body>
</html>
