<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maharaja Bhog – Daily Thali Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --saffron:#E8861A;--saffron-light:#F5C06A;--saffron-pale:#FDF3E3;
  --burgundy:#6B1A2A;--burgundy-dark:#4A0F1D;
  --cream:#FBF5E8;--cream-dark:#F2E8D0;
  --gold:#C9951A;--gold-light:#E8C870;
  --text-dark:#2C1810;--text-mid:#5C3D2E;--text-muted:#8B6B5C;
  --green:#2D5A2D;
}
body{background:var(--cream);font-family:'EB Garamond',serif;color:var(--text-dark);min-height:100vh;overflow-x:hidden}

.header{background:var(--burgundy-dark);padding:1.75rem 1.25rem 1.5rem;text-align:center;position:relative;overflow:hidden}
.header::before,.header::after{content:'';position:absolute;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--saffron),var(--gold-light),var(--saffron))}
.header::before{top:0}.header::after{bottom:0}
.ornament{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--saffron-light);letter-spacing:0.3em;margin-bottom:0.4rem;opacity:0.8}
.restaurant-name{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:600;color:var(--cream);letter-spacing:0.08em;line-height:1.1}
.restaurant-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--saffron-light);margin-top:0.3rem;letter-spacing:0.12em}
.divider-ornate{display:flex;align-items:center;gap:0.75rem;margin:0.7rem 2rem 0}
.divider-ornate::before,.divider-ornate::after{content:'';flex:1;height:1px;background:var(--gold);opacity:0.4}
.divider-ornate span{color:var(--saffron-light);font-size:1rem}

.nav-tabs{display:flex;background:var(--burgundy);border-bottom:3px solid var(--saffron)}
.tab-btn{flex:1;padding:0.8rem 0.25rem;background:none;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.06em;color:var(--saffron-light);opacity:0.55;transition:all 0.2s;border-bottom:3px solid transparent;margin-bottom:-3px;white-space:nowrap;text-align:center}
.tab-btn.active{opacity:1;color:var(--cream);border-bottom-color:var(--saffron);background:rgba(232,134,26,0.12)}
.tab-btn:hover:not(.active){opacity:0.8;background:rgba(255,255,255,0.05)}
.today-badge{display:block;background:var(--saffron);color:var(--cream);font-size:0.42rem;font-family:'Cinzel',serif;padding:1px 3px;border-radius:2px;margin:2px auto 0;width:fit-content}

.pani-puri-banner{background:linear-gradient(135deg,var(--green) 0%,#224422 100%);margin:0.9rem 1rem 0;border-radius:10px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:0.75rem;border:1px solid rgba(255,255,255,0.1)}
.pp-text h3{font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.1em;color:#B8E6B8;margin-bottom:0.2rem}
.pp-text p{font-family:'EB Garamond',serif;font-size:0.92rem;font-style:italic;color:rgba(255,255,255,0.82);line-height:1.35}
.pp-live{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:20px;font-size:0.65rem;color:#B8E6B8;font-family:'Cinzel',serif;margin-top:0.3rem}
.live-dot{width:6px;height:6px;border-radius:50%;background:#6EE86E;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

.menu-content{padding:0.9rem 1rem}
.day-header{text-align:center;margin:0.4rem 0 1rem}
.day-header h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--burgundy)}
.day-header p{font-family:'EB Garamond',serif;font-style:italic;color:var(--text-muted);font-size:0.9rem;margin-top:0.1rem}

.dotd{background:var(--burgundy-dark);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.1rem;position:relative;overflow:hidden;border:1px solid rgba(232,134,26,0.25)}
.dotd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--saffron),var(--gold-light),var(--saffron))}
.dotd-label{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;color:var(--saffron-light);margin-bottom:0.3rem}
.dotd-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--cream);line-height:1.2}
.dotd-desc{font-family:'EB Garamond',serif;font-style:italic;font-size:0.85rem;color:rgba(251,245,232,0.5);margin-top:0.2rem}

.section{margin-bottom:1rem}
.sec-hdr{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem}
.sec-lbl{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.14em;color:var(--burgundy);text-transform:uppercase;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--cream-dark)}
.sec-dot{width:5px;height:5px;border-radius:50%;background:var(--saffron);flex-shrink:0}

.grid{display:grid;gap:0.5rem}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr}

.card{background:white;border-radius:7px;padding:0.6rem 0.8rem;border:1px solid var(--cream-dark);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--saffron)}
.card.bur::before{background:var(--burgundy)}
.card.gld::before{background:var(--gold)}
.card.dim{background:#fafafa}.card.dim::before{background:var(--text-muted)}
.card-tag{font-family:'Cinzel',serif;font-size:0.46rem;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.12rem}
.card-name{font-family:'EB Garamond',serif;font-size:0.98rem;font-weight:500;color:var(--text-dark);line-height:1.25}

.aamras-card{background:linear-gradient(135deg,#FDF0D0,#FBE4A0);border-radius:7px;padding:0.6rem 0.8rem;border:1px solid var(--gold-light);position:relative;overflow:hidden}
.aamras-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.aamras-tag{font-family:'Cinzel',serif;font-size:0.46rem;letter-spacing:0.1em;color:var(--gold);margin-bottom:0.12rem}
.aamras-name{font-family:'EB Garamond',serif;font-size:0.98rem;font-weight:500;color:var(--text-dark)}

.included{background:var(--saffron-pale);border-radius:10px;padding:0.85rem 1rem;margin-top:0.25rem;border:1px solid var(--gold-light)}
.incl-lbl{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.14em;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem}
.chips{display:flex;flex-wrap:wrap;gap:0.35rem}
.chip{background:white;border:1px solid var(--gold-light);border-radius:20px;padding:0.25rem 0.65rem;font-family:'EB Garamond',serif;font-size:0.88rem;color:var(--text-mid)}

.weekend-block{background:linear-gradient(135deg,#FDF3E3,#FBE8C8);border:1px solid var(--gold);border-radius:10px;padding:0.9rem 1rem;margin-top:0.75rem;display:flex;align-items:center;gap:0.75rem}
.wk-label{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.2rem}
.wk-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--burgundy)}

.pricing{background:white;border-radius:10px;padding:0.85rem 1rem;margin-top:0.85rem;border:1px solid var(--cream-dark)}
.pr-lbl{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.14em;color:var(--burgundy);text-transform:uppercase;margin-bottom:0.55rem}
.pr-row{display:flex;justify-content:space-between;align-items:baseline;padding:0.28rem 0;border-bottom:1px solid var(--cream-dark)}
.pr-row:last-child{border-bottom:none;padding-bottom:0}
.pr-item{font-family:'EB Garamond',serif;font-size:0.93rem;color:var(--text-mid)}
.pr-price{font-family:'Cinzel',serif;font-size:0.82rem;font-weight:600;color:var(--burgundy)}

.allergen{font-family:'EB Garamond',serif;font-style:italic;font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:0.85rem;padding:0 0.25rem;line-height:1.5}
.footer{text-align:center;padding:1.25rem 1rem 2rem;border-top:1px solid var(--cream-dark);margin-top:0.9rem}
.footer p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--text-muted);line-height:1.6}
.footer .brand{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;color:var(--burgundy);margin-top:0.65rem;opacity:0.55}
</style>
</head>
<body>

<div class="header">
  <div class="ornament">✦ ॐ ✦</div>
  <div class="restaurant-name">Maharaja Bhog</div>
  <div class="restaurant-sub">Pure Vegetarian Thali</div>
  <div class="divider-ornate"><span>✦</span></div>
</div>

<div class="nav-tabs">
  <button class="tab-btn" data-day="0" onclick="switchDay(0)">Mon</button>
  <button class="tab-btn" data-day="1" onclick="switchDay(1)">Tue</button>
  <button class="tab-btn" data-day="2" onclick="switchDay(2)">Wed</button>
  <button class="tab-btn" data-day="3" onclick="switchDay(3)">Thu</button>
  <button class="tab-btn" data-day="4" onclick="switchDay(4)">Fri</button>
  <button class="tab-btn" data-day="5" onclick="switchDay(5)">Sat</button>
  <button class="tab-btn" data-day="6" onclick="switchDay(6)">Sun</button>
</div>

<div style="padding:0 0 0.25rem">
  <div class="pani-puri-banner">
    <div style="font-size:1.9rem;flex-shrink:0">🫙</div>
    <div class="pp-text">
      <h3>Pani Puri Counter</h3>
      <p>Live service — visit the counter anytime throughout your meal!</p>
      <div class="pp-live"><div class="live-dot"></div> Live during your visit</div>
    </div>
  </div>
</div>

<div id="menuContent" class="menu-content"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// UPDATE DAILY:
//   dishOfDay  — name + desc
//   farsan     — 2 items
//   sabzi      — 4 items  (from photo: Kathiwadi Undhiyo, Kadai Paneer, Aloo Patel Bhaji, Rajasthani Gatta)
//   bread      — 2 items  (from photo: Fulka Roti, Masala Poori)
//   rice       — items    (from photo: Steam Rice, Khichdi, Veg Biryani)
//   halwa      — type of halwa for the day
//
// NEVER CHANGES:
//   Dal & Kadhi — Rajasthani Dal, Gujrati Dal, Rajasthani Kadhi
//   Drinks      — Masala Chaas
//   Condiments  — Papad Churi, Chutney, Salad, Pickles
//   Aamras      — always present in summer
//   Jalebi      — weekends only
// ─────────────────────────────────────────────────────────────────────────────

const menu = {
  0: {
    name:"Monday", quote:"A fresh start, a warm thali",
    dishOfDay:{ name:"Dahi Vada", desc:"Soft lentil dumplings in cool yogurt with sweet & tangy chutneys" },
    farsan:["Dhokla","Aloo Tikki"],
    sabzi:["Aloo Matar","Bhindi Masala","Lauki Sabzi","Jeera Aloo"],
    bread:["Fulka Roti","Masala Poori"],
    rice:["Steam Rice","Khichdi"],
    halwa:"Suji Halwa",
    weekend:false
  },
  1: {
    name:"Tuesday", quote:"Comfort in every bite",
    dishOfDay:{ name:"Palak Chaat", desc:"Crispy spinach leaves topped with yogurt, chutneys & chaat masala" },
    farsan:["Kachori","Ragda Patties"],
    sabzi:["Palak Paneer","Mix Veg","Dum Aloo","Baingan Bharta"],
    bread:["Fulka Roti","Puri"],
    rice:["Steam Rice","Veg Biryani"],
    halwa:"Gajar Halwa",
    weekend:false
  },
  2: {
    name:"Wednesday", quote:"Halfway through, full of flavour",
    dishOfDay:{ name:"Rasam", desc:"South Indian tamarind & pepper broth, warm and aromatic" },
    farsan:["Paneer Sandwich Tikki","Patra"],
    sabzi:["Paneer Butter Masala","Gajar Matar","Aloo Gobi","Methi Sabzi"],
    bread:["Fulka Roti","Missi Roti"],
    rice:["Steam Rice","Khichdi"],
    halwa:"Moong Dal Halwa",
    weekend:false
  },
  3: {
    name:"Thursday", quote:"Rich traditions on your plate",
    dishOfDay:{ name:"Dal Pakwaan", desc:"Crispy Sindhi flatbread served with spiced chana dal" },
    farsan:["Dhokla","Aloo Tikki"],
    sabzi:["Shahi Paneer","Tinda Masala","Kadai Vegetables","Aloo Palak"],
    bread:["Fulka Roti","Masala Poori"],
    rice:["Steam Rice","Khichdi"],
    halwa:"Suji Halwa",
    weekend:false
  },
  4: {
    name:"Friday", quote:"End the week with a feast",
    dishOfDay:{ name:"Daal Baati Churma", desc:"Rajasthani baked baati with panchmel dal & sweet churma" },
    farsan:["Kachori","Ragda Patties"],
    sabzi:["Malai Kofta","Bhindi Do Pyaza","Kathiwadi Undhiyo","Rajasthani Gatta"],
    bread:["Fulka Roti","Puri"],
    rice:["Steam Rice","Veg Biryani"],
    halwa:"Gajar Halwa",
    weekend:false
  },
  5: {
    name:"Saturday", quote:"A royal weekend begins",
    dishOfDay:{ name:"Palak Chaat", desc:"Crispy spinach leaves topped with yogurt, chutneys & chaat masala" },
    farsan:["Paneer Sandwich Tikki","Patra"],
    sabzi:["Kadai Paneer","Aloo Patel Bhaji","Mix Veg Handi","Rajasthani Gatta"],
    bread:["Fulka Roti","Masala Poori"],
    rice:["Steam Rice","Khichdi","Veg Biryani"],
    halwa:"Moong Dal Halwa",
    weekend:true
  },
  6: {
    name:"Sunday", quote:"The grandest thali of the week",
    dishOfDay:{ name:"Daal Baati Churma", desc:"Rajasthani baked baati with panchmel dal & sweet churma" },
    farsan:["Paneer Sandwich Tikki","Patra"],
    sabzi:["Kathiwadi Undhiyo","Kadai Paneer","Aloo Patel Bhaji","Rajasthani Gatta"],
    bread:["Fulka Roti","Masala Poori"],
    rice:["Steam Rice","Khichdi","Veg Biryani"],
    halwa:"Kesari Halwa",
    weekend:true
  }
};

const DAL = ["Rajasthani Dal","Gujrati Dal","Rajasthani Kadhi"];

function secHdr(label) {
  return `<div class="sec-hdr"><div class="sec-dot"></div><span class="sec-lbl">${label}</span><div class="sec-line"></div></div>`;
}

function renderMenu(idx) {
  const d = menu[idx];
  const riceClass = d.rice.length >= 3 ? 'g3' : 'g2';

  document.getElementById('menuContent').innerHTML = `
    <div class="day-header">
      <h2>${d.name}'s Thali</h2>
      <p>${d.quote}</p>
    </div>

    <div class="dotd">
      <div class="dotd-label">✦ DISH OF THE DAY ✦</div>
      <div class="dotd-name">${d.dishOfDay.name}</div>
      <div class="dotd-desc">${d.dishOfDay.desc}</div>
    </div>

    <div class="section">
      ${secHdr('Appetizer / Farsan')}
      <div class="grid g2">
        ${d.farsan.map(s=>`<div class="card"><div class="card-name">${s}</div></div>`).join('')}
      </div>
    </div>

    <div class="section">
      ${secHdr('Main Course / Sabzi')}
      <div class="grid g4">
        ${d.sabzi.map(s=>`<div class="card bur"><div class="card-name">${s}</div></div>`).join('')}
      </div>
    </div>

    <div class="section">
      ${secHdr('Indian Breads')}
      <div class="grid g2">
        ${d.bread.map(s=>`<div class="card"><div class="card-name">${s}</div></div>`).join('')}
      </div>
    </div>

    <div class="section">
      ${secHdr('Rice')}
      <div class="grid ${riceClass}">
        ${d.rice.map(s=>`<div class="card bur"><div class="card-name">${s}</div></div>`).join('')}
      </div>
    </div>

    <div class="section">
      ${secHdr('Dal & Kadhi')}
      <div class="grid g3">
        ${DAL.map(s=>`<div class="card gld dim"><div class="card-tag">Daily</div><div class="card-name">${s}</div></div>`).join('')}
      </div>
    </div>

    <div class="section">
      ${secHdr('Dessert')}
      <div class="grid g2">
        <div class="aamras-card">
          <div class="aamras-tag">✦ Summer Special</div>
          <div class="aamras-name">Aamras</div>
        </div>
        <div class="card gld">
          <div class="card-tag">Daily Halwa</div>
          <div class="card-name">${d.halwa}</div>
        </div>
      </div>
    </div>

    <div class="included">
      <div class="incl-lbl">Always included</div>
      <div class="chips">
        <span class="chip">Masala Chaas</span>
        <span class="chip">Papad Churi</span>
        <span class="chip">Chutney</span>
        <span class="chip">Salad</span>
        <span class="chip">Pickles</span>
      </div>
    </div>

    ${d.weekend ? `
    <div class="weekend-block">
      <div style="font-size:1.8rem;flex-shrink:0">🍬</div>
      <div>
        <div class="wk-label">✦ WEEKEND SPECIAL ✦</div>
        <div class="wk-name">Jalebi — freshly made</div>
      </div>
    </div>` : ''}

    <div class="pricing">
      <div class="pr-lbl">Pricing (Plus Tax)</div>
      <div class="pr-row"><span class="pr-item">Adult Thali — Lunch</span><span class="pr-price">$27.99</span></div>
      <div class="pr-row"><span class="pr-item">Kids Thali (5–10 yrs)</span><span class="pr-price">$13.99</span></div>
      <div class="pr-row"><span class="pr-item">Adult Thali — Dinner</span><span class="pr-price">$27.99</span></div>
    </div>

    <div class="allergen">* Our food contains wheat, nuts and dairy products.<br>Any allergic reaction will be the responsibility of the diner.</div>

    <div class="footer">
      <p>"Every meal is a celebration.<br>Eat well, eat with love."</p>
      <div class="brand">✦ MAHARAJA BHOG ✦</div>
    </div>
  `;
}

function switchDay(idx) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-day="${idx}"]`).classList.add('active');
  renderMenu(idx);
}

const jsDay = new Date().getDay();
const todayIdx = jsDay === 0 ? 6 : jsDay - 1;
document.querySelectorAll('.tab-btn').forEach((btn, i) => {
  if (i === todayIdx) {
    btn.classList.add('active');
    const badge = document.createElement('span');
    badge.className = 'today-badge';
    badge.textContent = 'Today';
    btn.appendChild(badge);
  }
});
renderMenu(todayIdx);
</script>
</body>
</html>
